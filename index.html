<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Clone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/video.css">
  <link rel="stylesheet" href="styles/sidebar.css">

  <link rel="icon" href="icons/youtube-logo-title.png.png" type="image/png">
  <script src="scripts/app.js" defer></script>
</head>

<body>
  <header class="header">
    <div class="left-section">
      <button class="menu-button" type="button" aria-label="Toggle navigation">
        <img class="hamburger-menu" src="icons/hamburger-menu.svg" alt="">
      </button>
      <a class="logo-link" href="/" aria-label="YouTube Clone home">
        <img class="youtube-logo" src="icons/youtube-logo.svg" alt="YouTube">
      </a>
    </div>

    <form class="middle-section search-form" role="search">
      <input class="search-bar" type="search" placeholder="Search" aria-label="Search videos">
      <button class="search-button" type="submit">
        <img class="search-icon" src="icons/search.svg" alt="">
        <div class="tooltip">Search</div>
      </button>
      <button class="voice-search-button" type="button" aria-label="Search with your voice">
        <img class="voice-search-icon" src="icons/voice-search-icon.svg" alt="">
        <div class="tooltip">Search with your voice</div>
      </button>
    </form>

    <div class="right-section">
      <button class="upload-icon-container icon-button" type="button" aria-label="Create">
        <img class="upload-icon" src="icons/upload.svg" alt="">
        <div class="tooltip">Create</div>
      </button>
      <button class="icon-button apps-button" type="button" aria-label="YouTube apps">
        <img class="youtube-apps-icon" src="icons/youtube-apps.svg" alt="">
      </button>
      <button class="notifications-icon-container icon-button" type="button" aria-label="Notifications">
        <img class="notifications-icon" src="icons/notifications.svg" alt="">
        <div class="notifications-count">3</div>
      </button>
      <img class="current-user-picture" src="my profile/my-channel-1.jpeg" alt="Current user">
    </div>
  </header>

  <nav class="sidebar" aria-label="Primary navigation">
    <a class="sidebar-link" href="/">
      <img src="side bar/home.svg" alt="">
      <div>Home</div>
    </a>
    <a class="sidebar-link" href="/">
      <img src="side bar/explore.svg" alt="">
      <div>Explore</div>
    </a>
    <a class="sidebar-link" href="/">
      <img src="side bar/subscriptions.svg" alt="">
      <div>Subscriptions</div>
    </a>
    <a class="sidebar-link" href="/">
      <img src="side bar/originals.svg" alt="">
      <div>Originals</div>
    </a>
    <a class="sidebar-link" href="/">
      <img src="side bar/youtube-music.svg" alt="">
      <div>YouTube Music</div>
    </a>
    <a class="sidebar-link" href="/">
      <img src="side bar/library.svg" alt="">
      <div>Library</div>
    </a>
  </nav>

  <main>
    <p class="video-status" aria-live="polite">Loading videos...</p>
    <section class="video-grid" aria-label="Video recommendations"></section>
  </main>
</body>

</html>
